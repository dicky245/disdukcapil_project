# Training Configuration for KTP Field Detection Model
# YOLOv8 Custom Training from Scratch

project:
  name: "ktp_field_detector"
  version: "2.0.0"
  description: "YOLOv8 model trained from scratch for KTP field detection"

# ============================================
# DATASET CONFIGURATION
# ============================================
dataset:
  path: "D:/Semester 6/PA 3/Project/PA3/model/dataset"
  data_yaml: "data.yaml"

  splits:
    train: "Train/images"
    val: "Val/images"
    test: "Test/images"

  # Classes
  nc: 13
  names:
    - nik
    - nama
    - tempat_lahir
    - tanggal_lahir
    - alamat
    - rt_rw
    - kel_desa
    - kecamatan
    - agama
    - status_perkawinan
    - pekerjaan
    - kewarganegaraan
    - berlaku_hingga

# ============================================
# MODEL ARCHITECTURE
# ============================================
model:
  architecture: "yolov8"
  variant: "n"  # n (nano), s (small), m (medium), l (large), x (xlarge)

  pretrained: true  # Use pretrained weights (transfer learning)
  pretrained_path: "yolov8n.pt"

  # Custom model parameters
  params:
    width_multiplier: 0.25  # For YOLOv8n
    depth_multiplier: 0.33  # For YOLOv8n
    max_channels: 1024

# ============================================
# TRAINING HYPERPARAMETERS
# ============================================
training:
  # Basic parameters
  epochs: 100
  batch_size: 16
  image_size: 640

  # Optimizer
  optimizer: "AdamW"  # SGD, Adam, AdamW
  learning_rate: 0.01
  weight_decay: 0.0005
  momentum: 0.937

  # Learning rate scheduler
  lr_scheduler: "cosine"  # cosine, linear, constant
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  # Regularization
  patience: 20  # Early stopping patience
  dropout: 0.0
  label_smoothing: 0.0

  # Loss weights
  box_loss: 7.5
  cls_loss: 0.5
  dfl_loss: 1.5

# ============================================
# DATA AUGMENTATION
# ============================================
augmentation:
  # Geometric transformations
  hsv_h: 0.015      # Hue augmentation
  hsv_s: 0.7        # Saturation augmentation
  hsv_v: 0.4        # Value (brightness) augmentation
  degrees: 5.0      # Rotation (+- degrees)
  translate: 0.1    # Translation (+- fraction)
  scale: 0.5        # Scale (+- gain)
  shear: 2.0        # Shear (+- degrees)
  perspective: 0.0  # Perspective transform (+- fraction)
  flipud: 0.0       # Vertical flip probability
  fliplr: 0.5       # Horizontal flip probability
  mosaic: 1.0       # Mosaic augmentation probability
  mixup: 0.0        # MixUp augmentation probability

  # Copy-paste augmentation
  copy_paste: 0.0

# ============================================
# INFERENCE CONFIGURATION
# ============================================
inference:
  confidence: 0.5    # Confidence threshold
  iou: 0.45          # NMS IoU threshold
  max_detections: 300
  agnostic_nms: false

# ============================================
# VALIDATION & EVALUATION
# ============================================
validation:
  period: 1          # Validate every N epochs
  save_json: true    # Save results to JSON
  plot: true         # Save validation plots
  confusion_matrix: true

  metrics:
    - map50          # mAP at IoU 0.5
    - map50_95       # mAP at IoU 0.5:0.95
    - precision
    - recall
    - f1

# ============================================
# LOGGING & CHECKPOINTING
# ============================================
logging:
  project: "runs"
  name: "ktp_field_detector"
  verbose: true

  # Weights
  save_period: 10    # Save checkpoint every N epochs
  save_best: true    # Save best model
  save_last: true    # Save last epoch model

  # Logs
  wandb: false       # Weights & Biases logging
  tensorboard: false # TensorBoard logging
  csv: true          # CSV logging

# ============================================
# HARDWARE CONFIGURATION
# ============================================
hardware:
  device: "cpu"      # cpu, cuda, mps (Apple Silicon)
  workers: 8         # Number of data loading workers
  pin_memory: true   # Pin memory for faster GPU transfer

  # Mixed precision training
  amp: false         # Automatic mixed precision

# ============================================
# ADVANCED SETTINGS
# ============================================
advanced:
  # Overwrite existing experiment
  exist_ok: false

  # Single-class detection (if needed)
  single_cls: false

  # Rectangular training
  rect: false

  # Resume training from checkpoint
  resume: false
  resume_path: null

  # Close mosaic augmentation in final epochs
  close_mosaic: 10
  mosaic_prob: 1.0

# ============================================
# POST-TRAINING
# ============================================
post_training:
  # Model export
  export_formats:
    - torchscript   # TorchScript
    - onnx         # ONNX
    - engine       # TensorRT (if available)

  # Model optimization
  optimize: true
  simplify: true
  dynamic: false
  opset: 12

# ============================================
# NOTES
# ============================================
# 1. Train from scratch: Set pretrained=false
# 2. Transfer learning: Set pretrained=true (recommended)
# 3. Quick training: Use variant='n', epochs=50
# 4. Best accuracy: Use variant='m' or 'l', epochs=150+
# 5. For GPU: Set device='cuda' in hardware section
